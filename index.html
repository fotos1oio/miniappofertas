<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; connect-src * https://api-buscador-afiliados.keidysonpm.workers.dev; img-src * data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Premium de Ofertas</title>
    
    <!-- Fonte Inter (Design Limpo e Premium) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SDK Oficial do Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Fundo cinza bem claro para destacar os cards brancos */
            color: #111827;
        }
        
        /* Ajuste para o Dark Mode Nativo do Telegram */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: var(--tg-theme-bg-color, #121212);
                color: var(--tg-theme-text-color, #ffffff);
            }
            .premium-card {
                background-color: #1e1e1e !important;
                border-color: #2d2d2d !important;
            }
            .search-bar {
                background-color: #1e1e1e !important;
                color: #fff !important;
                border-color: #333 !important;
            }
        }

        .premium-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="p-4 sm:p-6 max-w-2xl mx-auto">

    <!-- Cabeçalho Premium -->
    <header class="mb-6 mt-2">
        <h1 class="text-2xl font-bold tracking-tight">Comparador <span class="text-blue-600 dark:text-blue-400">PRO</span></h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">O menor preço garantido nos maiores marketplaces.</p>
    </header>

    <!-- Barra de Busca Avançada -->
    <div class="relative mb-8 shadow-sm">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        </div>
        <input 
            type="text" 
            id="search-input" 
            placeholder="Ex: Trezor Model T, Fone JBL..." 
            class="search-bar block w-full pl-10 pr-24 py-4 rounded-xl border border-gray-200 bg-white text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
            onkeypress="if(event.key === 'Enter') buscarProdutos()"
        >
        <button 
            onclick="buscarProdutos()" 
            class="absolute inset-y-1.5 right-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-5 py-2 rounded-lg transition-colors shadow-sm"
        >
            Buscar
        </button>
    </div>

    <!-- Skeleton Loading (Estilo Premium de Carregamento) -->
    <div id="loading" class="hidden space-y-4">
        <div class="flex p-4 rounded-2xl bg-white dark:bg-[#1e1e1e] border border-gray-100 dark:border-gray-800">
            <div class="w-24 h-24 rounded-xl skeleton flex-shrink-0"></div>
            <div class="ml-4 flex-1 space-y-3 py-1">
                <div class="h-4 skeleton rounded w-3/4"></div>
                <div class="h-3 skeleton rounded w-1/2"></div>
                <div class="h-6 skeleton rounded w-1/3 mt-4"></div>
            </div>
        </div>
        <div class="flex p-4 rounded-2xl bg-white dark:bg-[#1e1e1e] border border-gray-100 dark:border-gray-800">
            <div class="w-24 h-24 rounded-xl skeleton flex-shrink-0"></div>
            <div class="ml-4 flex-1 space-y-3 py-1">
                <div class="h-4 skeleton rounded w-3/4"></div>
                <div class="h-3 skeleton rounded w-1/2"></div>
                <div class="h-6 skeleton rounded w-1/3 mt-4"></div>
            </div>
        </div>
    </div>

    <!-- Lista de Resultados -->
    <div id="results" class="space-y-4">
        <!-- Estado Inicial (Vazio) -->
        <div class="text-center py-10 opacity-60">
            <i class="fa-solid fa-wallet text-4xl mb-3 text-gray-300 dark:text-gray-600"></i>
            <p class="text-sm">Digite um produto acima para comparar os preços.</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function buscarProdutos() {
    const query = document.getElementById('search-input').value;
    if (!query) return;

    const resultsContainer = document.getElementById('results');
    const loadingDiv = document.getElementById('loading');

    resultsContainer.innerHTML = '';
    loadingDiv.classList.remove('hidden');

    try {
        const urlDoSeuBackend = 'https://api-buscador-afiliados.keidysonpm.workers.dev/';
        
        // Requisição otimizada para navegadores restritivos
        const resposta = await fetch(`${urlDoSeuBackend}?q=${encodeURIComponent(query)}`, {
            method: 'GET',
            mode: 'cors', // Define explicitamente o modo CORS
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        if (!resposta.ok) {
            throw new Error(`Servidor respondeu com status: ${resposta.status}`);
        }
        
        const dados = await resposta.json();
        
        loadingDiv.classList.add('hidden');
        exibirResultados(dados);
        
    } catch (error) {
        loadingDiv.classList.add('hidden');
        console.error("Erro detalhado:", error); // Isso aparece no console do navegador
        resultsContainer.innerHTML = `
            <div class="text-center p-6 bg-red-50 dark:bg-red-900/20 rounded-xl">
                <p class="text-red-500 font-bold mb-2">Ops! Falha na conexão.</p>
                <p class="text-sm text-gray-600 dark:text-gray-400">Verifique se o servidor está ativo.</p>
                <button onclick="buscarProdutos()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg font-medium">Tentar Novamente</button>
            </div>`;
    }
}

        async function simularBuscaDoBackend(termo) {
            // SUBSTITUA ESTE LINK PELO LINK REAL DO SEU CLOUDFLARE WORKER!
            const urlDoSeuBackend = 'https://api-buscador-afiliados.keidysonpm.workers.dev';
            
            try {
                // Faz a requisição real para o seu servidor passando o produto
                const resposta = await fetch(`${urlDoSeuBackend}?q=${encodeURIComponent(termo)}`);
                const dados = await resposta.json();
                return dados;
            } catch (erro) {
                console.error("Erro na comunicação com o backend:", erro);
                throw erro;
            }
        }

function exibirResultados(produtos) {
    const container = document.getElementById('results');
    container.innerHTML = ''; // Limpa resultados anteriores
    
    if (produtos.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500">Nenhum produto encontrado.</p>';
        return;
    }
    
    produtos.forEach((prod, index) => {
        const isCampeao = index === 0;
        const desconto = Math.round(((prod.precoAntigo - prod.preco) / prod.precoAntigo) * 100);

        const card = document.createElement('div');
        card.className = `premium-card relative flex p-3 sm:p-4 rounded-2xl bg-white border ${isCampeao ? 'border-green-500 premium-shadow' : 'border-gray-100'} transition-all`;
        
        card.innerHTML = `
            ${isCampeao ? '<div class="absolute -top-3 left-4 bg-green-500 text-white text-[10px] font-bold py-1 px-3 rounded-full">Melhor Preço</div>' : ''}
            <div class="w-24 h-24 rounded-xl bg-gray-100 overflow-hidden relative flex-shrink-0">
                <img src="${prod.img}" alt="${prod.produto}" class="w-full h-full object-cover">
            </div>
            <div class="ml-4 flex flex-col justify-between flex-1">
                <h3 class="font-semibold text-sm line-clamp-2">${prod.produto}</h3>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-400 line-through">R$ ${prod.precoAntigo.toFixed(2)}</span>
                    <span class="text-xs font-bold text-red-500">-${desconto}%</span>
                </div>
                <div class="flex items-end justify-between mt-2">
                    <p class="text-lg font-extrabold text-green-600">R$ ${prod.preco.toFixed(2)}</p>
                    <button onclick="abrirLink('${prod.link}')" class="bg-gray-900 text-white text-xs px-4 py-2 rounded-lg">
                        Comprar
                    </button>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

// Função especial para abrir links no Telegram
function abrirLink(url) {
    if (window.Telegram.WebApp) {
        window.Telegram.WebApp.openLink(url);
    } else {
        window.open(url, '_blank');
    }
}
    </script>
</body>
</html>
